server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS so upstreams resolve at request time, not startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # WebSocket — keep-alive upgrade (must be before /api/ to match first)
    location /api/ws/ {
        set $backend_upstream http://backend:8000;
        proxy_pass          $backend_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
    }

    # API — proxy to FastAPI backend (no trailing slash = full path preserved)
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass         $backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # Frontend SPA
    location / {
        set $frontend_upstream http://frontend;
        proxy_pass       $frontend_upstream;
        proxy_set_header Host $host;
    }
}
