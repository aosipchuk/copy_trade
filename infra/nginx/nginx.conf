server {
    listen 80;
    server_name _;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # Use Docker's embedded DNS so upstreams resolve at request time, not startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API — proxy to FastAPI backend
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass         $backend_upstream/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # WebSocket — keep-alive upgrade
    location /api/ws/ {
        set $backend_upstream http://backend:8000;
        proxy_pass          $backend_upstream/ws/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
    }

    # Frontend SPA — proxy to nginx-served static files
    location / {
        set $frontend_upstream http://frontend;
        proxy_pass       $frontend_upstream;
        proxy_set_header Host $host;
    }
}
