# Production overlay — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences from dev:
#   - No exposed ports on postgres / redis / clickhouse (internal network only)
#   - No source volume mounts (immutable images)
#   - Backend runs without --reload
#   - Frontend + API served by nginx-proxy on port 80
#   - SSL handled by Cloudflare Tunnel (no certbot needed)

services:
  postgres:
    ports: !reset []            # remove dev port mapping
    deploy:
      resources:
        limits:
          memory: 300M

  redis:
    ports: !reset []
    command: >
      redis-server
      --maxmemory 400mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in production}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    deploy:
      resources:
        limits:
          memory: 450M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes: !reset []           # no live-reload mount in prod
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 700M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 100M

  # Disable dev nginx on prod — nginx-proxy handles port 80 instead.
  nginx:
    profiles:
      - dev

  nginx-proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
