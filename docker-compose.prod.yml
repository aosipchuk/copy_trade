# Production overlay — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences from dev:
#   - No exposed ports on postgres / redis / clickhouse (internal network only)
#   - No source volume mounts (immutable images)
#   - Backend runs without --reload
#   - Frontend + API served by nginx-proxy on port 80
#   - SSL handled by Cloudflare Tunnel (no certbot needed)

services:
  postgres:
    ports: !reset []            # remove dev port mapping

  redis:
    ports: !reset []
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in production}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]

  clickhouse:
    ports: !reset []
    environment:
      CLICKHOUSE_DB: copytrade
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set in production}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test:
        - "CMD-SHELL"
        - "clickhouse-client --user default --password ${CLICKHOUSE_PASSWORD} --query 'SELECT 1' || exit 1"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes: !reset []           # no live-reload mount in prod
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 800M

  celery-worker:
    volumes: !reset []
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    command: >
      uv run celery -A app.tasks.celery_app worker
        --loglevel=warning
        --concurrency=4
        -Q default,signals,execution
    restart: unless-stopped

  celery-beat:
    volumes: !reset []
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    command: >
      uv run celery -A app.tasks.celery_app beat
        --loglevel=warning
        --scheduler celery.beat.PersistentScheduler
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  # Disable dev nginx on prod — nginx-proxy handles port 80 instead.
  nginx:
    profiles:
      - dev

  nginx-proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
